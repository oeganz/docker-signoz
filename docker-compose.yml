services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - signoz-clickhouse:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=signoz
      - CLICKHOUSE_USER=signoz
      - CLICKHOUSE_PASSWORD=***
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9009:9009"

  otel-collector:
    image: signoz/signoz-otel-collector:latest
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - clickhouse
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro

  query-service:
    image: signoz/query-service:latest
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "3301:3301"
    environment:
      - SIGNOZ_CLICKHOUSE_HOST=clickhouse
      - SIGNOZ_CLICKHOUSE_PORT=9000
      - SIGNOZ_CLICKHOUSE_USER=signoz
      - SIGNOZ_CLICKHOUSE_PASSWORD=***
      - SIGNOZ_CLICKHOUSE_DB=signoz
    depends_on:
      - clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3301/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: signoz/frontend:latest
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "3300:3300"
    environment:
      - SIGNOZ_API_HOST=query-service
    depends_on:
      - query-service
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3300"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  signoz-clickhouse:
